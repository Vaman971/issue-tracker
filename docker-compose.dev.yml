services:
  backend:
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

  redis:
    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: issue_tracker_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@issue.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: issue_tracker_redis_commander
    restart: always
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
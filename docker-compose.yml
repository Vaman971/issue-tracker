services:
  migrate:
    build:
      context: ./backend
    container_name: issue_tracker_migrate
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["sh", "scripts/migrate.sh"]
    restart: "no"

  backend:
    build:
      context: ./backend
    container_name: issue_tracker_backend
    restart: always
    env_file:
      - ./backend/.env
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
    container_name: issue_tracker_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    expose:
      - "3000"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: issue_tracker_postgres
    restart: always
    environment:
      POSTGRES_USER: issue_user
      POSTGRES_PASSWORD: issue_password
      POSTGRES_DB: issue_tracker
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U issue_user -d issue_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: issue_tracker_redis
    restart: always
    expose:
      - "6379"

  nginx:
    image: nginx:1.27-alpine
    container_name: issue_tracker_nginx
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: issue-tracker
data:
  nginx.conf: |
    worker_processes auto;
    worker_rlimit_nofile 65535;

    events {
        worker_connections 4096;
        use epoll;
        multi_accept on;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        # Logging
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time';
        access_log /var/log/nginx/access.log main;
        error_log  /var/log/nginx/error.log warn;

        # Performance
        sendfile        on;
        tcp_nopush      on;
        tcp_nodelay     on;
        keepalive_timeout 65;
        keepalive_requests 1000;
        types_hash_max_size 2048;
        server_tokens off;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css application/json application/javascript
                   text/xml application/xml application/xml+rss text/javascript
                   image/svg+xml;

        # Upstream: keepalive pools to avoid per-request TCP handshakes
        upstream backend_upstream {
            server backend:8000;
            keepalive 64;
        }

        upstream frontend_upstream {
            server frontend:3000;
            keepalive 32;
        }

        server {
            listen 80;
            server_name _;

            client_max_body_size 10M;

            # Proxy common settings
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Health check — nginx itself, no upstream proxy
            location /nginx-health {
                access_log off;
                return 200 "ok\n";
                add_header Content-Type text/plain;
            }

            # /api/* → FastAPI backend (strip /api prefix)
            location /api/ {
                proxy_pass http://backend_upstream/;
            }

            # WebSocket upgrade for any future real-time features
            location /ws/ {
                proxy_pass http://backend_upstream/ws/;
                proxy_set_header Upgrade    $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_read_timeout 3600s;
            }

            # Everything else → Next.js frontend
            location / {
                proxy_pass http://frontend_upstream;
            }
        }
    }

apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: issue-tracker
data:
  APP_ENV: "production"
  APP_NAME: "Issue Tracker"
  # Set to 4 workers per pod; combined with HPA (up to 30 pods) this gives
  # 120 uvicorn workers which comfortably handles 10K+ RPS for typical CRUD
  WEB_CONCURRENCY: "4"
  FILE_STORAGE_BACKEND: "s3"
  AWS_REGION: "ap-south-1"
  # These must match the values set in AWS Secrets Manager (issue-tracker/production)
  SMTP_PORT: "587"
  SMTP_USE_TLS: "true"
  SMTP_FROM_EMAIL: "noreply@yourdomain.com"
  # Celery
  CELERY_TASK_ALWAYS_EAGER: "false"

# ClusterSecretStore — one store per cluster pointing at AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# ExternalSecret — maps the JSON stored at issue-tracker/production into a
# Kubernetes Secret.  Create the AWS secret with this JSON structure:
# {
#   "DATABASE_URL":           "postgresql+asyncpg://user:pass@host/db",
#   "REDIS_URL":              "rediss://:token@cluster-endpoint:6379/0",
#   "JWT_SECRET_KEY":         "...",
#   "JWT_REFRESH_SECRET_KEY": "...",
#   "S3_BUCKET_NAME":         "issue-tracker-uploads-prod",
#   "SMTP_HOST":              "smtp.sendgrid.net",
#   "SMTP_USERNAME":          "apikey",
#   "SMTP_PASSWORD":          "SG...",
#   "NEXT_PUBLIC_API_URL":    "https://yourdomain.com"
# }
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: issue-tracker
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: issue-tracker/production
        property: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: issue-tracker/production
        property: REDIS_URL
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: issue-tracker/production
        property: JWT_SECRET_KEY
    - secretKey: JWT_REFRESH_SECRET_KEY
      remoteRef:
        key: issue-tracker/production
        property: JWT_REFRESH_SECRET_KEY
    - secretKey: S3_BUCKET_NAME
      remoteRef:
        key: issue-tracker/production
        property: S3_BUCKET_NAME
    - secretKey: SMTP_HOST
      remoteRef:
        key: issue-tracker/production
        property: SMTP_HOST
    - secretKey: SMTP_USERNAME
      remoteRef:
        key: issue-tracker/production
        property: SMTP_USERNAME
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: issue-tracker/production
        property: SMTP_PASSWORD

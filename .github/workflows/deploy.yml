name: CI / CD — Deploy to Kubernetes

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never cancel an in-flight deploy; queue instead
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write   # required for AWS OIDC
  contents: read

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER_NAME: issue-tracker-production
  K8S_NAMESPACE: issue-tracker

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Detect which parts of the repo changed
  # ──────────────────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ──────────────────────────────────────────────────────────────────────────
  # 2a. Backend tests (pytest + alembic migration check)
  # ──────────────────────────────────────────────────────────────────────────
  test-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run migrations on test DB
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
        run: alembic upgrade head
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
          JWT_REFRESH_SECRET_KEY: ci-test-refresh-secret-key-not-for-production
          APP_ENV: testing
        run: pytest tests/ -v --cov=app --cov-report=term-missing

  # ──────────────────────────────────────────────────────────────────────────
  # 2b. Frontend tests (eslint + jest)
  # ──────────────────────────────────────────────────────────────────────────
  test-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm test -- --ci --coverage --passWithNoTests
        working-directory: frontend

  # ──────────────────────────────────────────────────────────────────────────
  # 3a. Build & push backend image
  # ──────────────────────────────────────────────────────────────────────────
  build-backend:
    needs: [changes, test-backend]
    if: |
      always() &&
      (needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') &&
      needs.test-backend.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set image tag
        id: meta
        run: echo "image=${{ steps.login-ecr.outputs.registry }}/issue-tracker-backend:${{ github.sha }}" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.login-ecr.outputs.registry }}/issue-tracker-backend:latest
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/issue-tracker-backend:latest
          cache-to: type=inline

  # ──────────────────────────────────────────────────────────────────────────
  # 3b. Build & push frontend image
  # ──────────────────────────────────────────────────────────────────────────
  build-frontend:
    needs: [changes, test-frontend]
    if: |
      always() &&
      (needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch') &&
      needs.test-frontend.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set image tag
        id: meta
        run: echo "image=${{ steps.login-ecr.outputs.registry }}/issue-tracker-frontend:${{ github.sha }}" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.login-ecr.outputs.registry }}/issue-tracker-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/issue-tracker-frontend:latest
          cache-to: type=inline

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Deploy to EKS
  #    Runs if at least one build succeeded (or was skipped because no code
  #    changed) and neither build failed.
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    needs: [changes, build-backend, build-frontend]
    if: |
      always() &&
      needs.build-backend.result  != 'failure' &&
      needs.build-frontend.result != 'failure' &&
      (
        needs.build-backend.result  == 'success' ||
        needs.build-frontend.result == 'success' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      # ── Resolve which image to deploy for each service ─────────────────
      - name: Resolve image tags
        id: images
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          SHA="${{ github.sha }}"

          if [[ "${{ needs.build-backend.result }}" == "success" ]]; then
            echo "backend=${REGISTRY}/issue-tracker-backend:${SHA}" >> $GITHUB_OUTPUT
          else
            CURRENT=$(kubectl get deployment backend \
              -n ${{ env.K8S_NAMESPACE }} \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null \
              || echo "${REGISTRY}/issue-tracker-backend:latest")
            echo "backend=${CURRENT}" >> $GITHUB_OUTPUT
          fi

          if [[ "${{ needs.build-frontend.result }}" == "success" ]]; then
            echo "frontend=${REGISTRY}/issue-tracker-frontend:${SHA}" >> $GITHUB_OUTPUT
          else
            CURRENT=$(kubectl get deployment frontend \
              -n ${{ env.K8S_NAMESPACE }} \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null \
              || echo "${REGISTRY}/issue-tracker-frontend:latest")
            echo "frontend=${CURRENT}" >> $GITHUB_OUTPUT
          fi

      # ── Apply any manifest changes (configmap, secrets, ingress, etc.) ──
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f infra/kubernetes/namespace.yaml
          kubectl apply -f infra/kubernetes/configmap.yaml
          kubectl apply -f infra/kubernetes/secrets/external-secrets.yaml
          kubectl apply -f infra/kubernetes/nginx/configmap.yaml
          kubectl apply -f infra/kubernetes/nginx/deployment.yaml
          kubectl apply -f infra/kubernetes/nginx/service.yaml
          kubectl apply -f infra/kubernetes/backend/service.yaml
          kubectl apply -f infra/kubernetes/backend/hpa.yaml
          kubectl apply -f infra/kubernetes/backend/pdb.yaml
          kubectl apply -f infra/kubernetes/frontend/service.yaml
          kubectl apply -f infra/kubernetes/frontend/hpa.yaml
          kubectl apply -f infra/kubernetes/frontend/pdb.yaml
          kubectl apply -f infra/kubernetes/celery/worker-hpa.yaml
          kubectl apply -f infra/kubernetes/ingress/ingress.yaml

      # ── Database migrations ───────────────────────────────────────────────
      - name: Run database migrations
        if: needs.build-backend.result == 'success' || github.event_name == 'workflow_dispatch'
        run: |
          kubectl delete job db-migrate -n ${{ env.K8S_NAMESPACE }} --ignore-not-found

          export MIGRATE_IMAGE="${{ steps.images.outputs.backend }}"
          envsubst < infra/kubernetes/jobs/migrate-job.yaml | kubectl apply -f -

          echo "Waiting for migration to complete (max 5 min)..."
          kubectl wait job/db-migrate \
            -n ${{ env.K8S_NAMESPACE }} \
            --for=condition=complete \
            --timeout=300s

          echo "=== Migration logs ==="
          kubectl logs job/db-migrate -n ${{ env.K8S_NAMESPACE }}

          kubectl delete job db-migrate -n ${{ env.K8S_NAMESPACE }} --ignore-not-found

      # ── Roll out backend, celery-worker, celery-beat ─────────────────────
      - name: Deploy backend
        if: needs.build-backend.result == 'success'
        run: |
          kubectl apply -f infra/kubernetes/backend/deployment.yaml
          kubectl set image deployment/backend \
            backend=${{ steps.images.outputs.backend }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/backend \
            -n ${{ env.K8S_NAMESPACE }} --timeout=10m

      - name: Deploy celery worker
        if: needs.build-backend.result == 'success'
        run: |
          kubectl apply -f infra/kubernetes/celery/worker-deployment.yaml
          kubectl set image deployment/celery-worker \
            celery-worker=${{ steps.images.outputs.backend }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/celery-worker \
            -n ${{ env.K8S_NAMESPACE }} --timeout=5m

      - name: Deploy celery beat
        if: needs.build-backend.result == 'success'
        run: |
          kubectl apply -f infra/kubernetes/celery/beat-deployment.yaml
          kubectl set image deployment/celery-beat \
            celery-beat=${{ steps.images.outputs.backend }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/celery-beat \
            -n ${{ env.K8S_NAMESPACE }} --timeout=5m

      # ── Roll out frontend ─────────────────────────────────────────────────
      - name: Deploy frontend
        if: needs.build-frontend.result == 'success'
        run: |
          kubectl apply -f infra/kubernetes/frontend/deployment.yaml
          kubectl set image deployment/frontend \
            frontend=${{ steps.images.outputs.frontend }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/frontend \
            -n ${{ env.K8S_NAMESPACE }} --timeout=10m

      # ── Deployment summary ────────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n ${{ env.K8S_NAMESPACE }}
          echo "=== HPA status ==="
          kubectl get hpa -n ${{ env.K8S_NAMESPACE }}
          echo "=== Ingress ==="
          kubectl get ingress -n ${{ env.K8S_NAMESPACE }}
          echo "=== Recent events ==="
          kubectl get events -n ${{ env.K8S_NAMESPACE }} \
            --sort-by='.lastTimestamp' | tail -20

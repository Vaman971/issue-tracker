name: Infra CI

on:
  push:
    paths:
      - "docker-compose.yml"
      - "docker-compose.dev.yml"
      - "nginx/**"
      - ".github/workflows/infra-ci.yml"
  pull_request:
    paths:
      - "docker-compose.yml"
      - "docker-compose.dev.yml"
      - "nginx/**"
      - ".github/workflows/infra-ci.yml"

jobs:
  validate-compose-and-nginx:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate production compose file
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Validate dev compose override
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml config > /dev/null

      - name: Validate nginx config
        run: |
          docker run --rm \
            -v "$PWD/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            nginx:1.27-alpine nginx -t

      - name: Build compose images
        run: docker compose -f docker-compose.yml build backend frontend